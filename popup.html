<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assessment Filler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" stroke="url(#g1)" stroke-width="2"/>
          <circle cx="8.5" cy="8.5" r="1.5" fill="url(#g1)"/>
          <circle cx="15.5" cy="8.5" r="1.5" fill="url(#g1)"/>
          <circle cx="8.5" cy="15.5" r="1.5" fill="url(#g1)"/>
          <circle cx="15.5" cy="15.5" r="1.5" fill="url(#g1)"/>
          <circle cx="12" cy="12" r="1.5" fill="url(#g1)"/>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
              <stop stop-color="#a855f7"/><stop offset="1" stop-color="#6366f1"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="header-text">
        <h1>Assessment Filler</h1>
        <p>Smart NFPE auto-fill</p>
      </div>
      <div class="badge" id="questions-badge">
        <span id="q-count">—</span>
        <span class="badge-label">questions</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- How it works -->
    <div class="section-label">What this does</div>

    <div class="info-cards">
      <div class="info-card grade-card">
        <div class="info-card-icon">🎯</div>
        <div class="info-card-text">
          <div class="info-card-title">Grades</div>
          <div class="info-card-sub">Randomly picks <strong>A+</strong> or <strong>A</strong> for every question</div>
        </div>
      </div>
      <div class="info-card future-card">
        <div class="info-card-icon">📋</div>
        <div class="info-card-text">
          <div class="info-card-title">Future Steps</div>
          <div class="info-card-sub">Picks from <strong>first 2</strong> options only</div>
        </div>
      </div>
      <div class="info-card safe-card">
        <div class="info-card-icon">🔒</div>
        <div class="info-card-text">
          <div class="info-card-title">Safe Zones</div>
          <div class="info-card-sub">Sidebar, Cycle &amp; Unit selectors are <strong>untouched</strong></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Status area -->
    <div class="scan-status" id="scan-status">
      <div class="scan-dot" id="scan-dot"></div>
      <span id="scan-text">Scanning page…</span>
    </div>

    <!-- Fill Button -->
    <button class="fill-btn" id="fill-btn" disabled>
      <span class="btn-icon" id="btn-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M3 3l6 6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span id="btn-text">Fill Assessment</span>
    </button>

    <!-- Reset -->
    <button class="reset-btn" id="reset-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M3 3v5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Reset All Selections
    </button>

    <!-- Result message -->
    <div class="result-msg" id="result-msg"></div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
